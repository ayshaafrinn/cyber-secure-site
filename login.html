<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cyber Security Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
<style>
/* ANIMATIONS & DESIGN - NO CODE CHANGED */
.login-box {
    animation: fadeInUp 0.8s ease-out;
    backdrop-filter: blur(12px);
    background: rgba(10, 20, 40, 0.7);
    border: 1px solid rgba(0, 255, 255, 0.2);
    box-shadow: 0 0 60px rgba(0, 255, 255, 0.1), inset 0 0 60px rgba(0, 255, 255, 0.05);
    transition: all 0.3s ease;
}
.login-box:hover {
    box-shadow: 0 0 80px rgba(0, 255, 255, 0.2), inset 0 0 80px rgba(0, 255, 255, 0.08);
    transform: translateY(-2px);
}
.login-box h1 {
    animation: glowPulse 3s ease-in-out infinite;
    background: linear-gradient(45deg, #00ffff, #0088ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: none;
}
.login-box input {
    animation: slideIn 0.6s ease-out forwards;
    opacity: 0;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(0, 255, 255, 0.15);
    transition: all 0.3s ease;
}
.login-box input:nth-child(3) { animation-delay: 0.1s; }
.login-box input:nth-child(4) { animation-delay: 0.2s; }
.login-box input:focus {
    border-color: #00ffff;
    box-shadow: 0 0 25px rgba(0, 255, 255, 0.15);
    background: rgba(255,255,255,0.08);
    transform: scale(1.02);
}
.login-box button {
    animation: pulse 2s ease-in-out infinite;
    background: linear-gradient(135deg, #00ccff, #0066ff);
    border: none;
    transition: all 0.3s ease;
    letter-spacing: 3px;
    font-weight: 700;
}
.login-box button:hover {
    transform: scale(1.05) translateY(-2px);
    box-shadow: 0 0 40px rgba(0, 150, 255, 0.4);
    animation-play-state: paused;
}
.bg-overlay {
    background: radial-gradient(ellipse at center, #0a0a2a 0%, #000000 100%);
    animation: bgShift 20s ease-in-out infinite;
}
.bg-overlay::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: 
        radial-gradient(circle at 20% 50%, rgba(0, 255, 255, 0.05) 0%, transparent 50%),
        radial-gradient(circle at 80% 50%, rgba(0, 100, 255, 0.05) 0%, transparent 50%);
    animation: rotateBg 30s linear infinite;
}
.sub {
    animation: fadeIn 1s ease-out 0.5s both;
    color: rgba(0, 255, 255, 0.6);
}
.mini-hints {
    animation: fadeIn 1s ease-out 1s both;
}
#message {
    animation: shake 0.5s ease-in-out;
}
@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(40px); }
    to { opacity: 1; transform: translateY(0); }
}
@keyframes slideIn {
    from { opacity: 0; transform: translateX(-20px); }
    to { opacity: 1; transform: translateX(0); }
}
@keyframes glowPulse {
    0%, 100% { filter: drop-shadow(0 0 10px rgba(0, 255, 255, 0.3)); }
    50% { filter: drop-shadow(0 0 30px rgba(0, 255, 255, 0.6)); }
}
@keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.02); }
}
@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}
@keyframes bgShift {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.8; }
}
@keyframes rotateBg {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}
@keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    75% { transform: translateX(5px); }
}
/* Glitch text effect on hover */
.login-box:hover h1 {
    animation: glitch 0.3s ease-in-out;
}
@keyframes glitch {
    0% { transform: translate(0); }
    20% { transform: translate(-2px, 2px); }
    40% { transform: translate(2px, -2px); }
    60% { transform: translate(-2px, -2px); }
    80% { transform: translate(2px, 2px); }
    100% { transform: translate(0); }
}
/* Floating particles */
.bg-overlay::after {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: 
        radial-gradient(2px 2px at 20% 30%, rgba(0,255,255,0.3), transparent),
        radial-gradient(2px 2px at 40% 70%, rgba(0,255,255,0.2), transparent),
        radial-gradient(2px 2px at 60% 20%, rgba(0,255,255,0.3), transparent),
        radial-gradient(2px 2px at 80% 80%, rgba(0,255,255,0.2), transparent),
        radial-gradient(2px 2px at 10% 90%, rgba(0,255,255,0.3), transparent),
        radial-gradient(2px 2px at 90% 10%, rgba(0,255,255,0.2), transparent);
    background-size: 200px 200px;
    animation: floatParticles 20s linear infinite;
    pointer-events: none;
}
@keyframes floatParticles {
    from { transform: translateY(0); }
    to { transform: translateY(-200px); }
}
/* Password strength animation */
#strength {
    transition: all 0.3s ease;
}
</style>
</head>

<body class="login-body">

<div class="bg-overlay"></div>

<div class="login-box">

    <h1>🔐 Cyber Security Access</h1>
    <p class="sub">Secure system authentication panel</p>

    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">

    <p id="strength"></p>

    <button onclick="login()">LOGIN</button>

    <p id="message"></p>

    <div class="mini-hints">
        <p>Try: admin / Admin123</p>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
